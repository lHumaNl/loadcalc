version: "1.0"

global:
  tool: jmeter
  load_model: closed

scenarios:
  First:
    target_intensity: 1000
    intensity_unit: ops_h
    max_script_time_ms: 500
  Duplicate:
    target_intensity: 2000
    intensity_unit: ops_h
    max_script_time_ms: 600

profile:
  type: stability
  percent: 100
  default_rampup_sec: 60
  default_impact_sec: 120
  default_stability_sec: 300
  default_rampdown_sec: 60
