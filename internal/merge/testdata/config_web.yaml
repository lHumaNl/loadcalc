version: "1.0"

global:
  tool: jmeter
  load_model: closed
  pacing_multiplier: 3.0
  deviation_tolerance: 2.5
  spike_participate: true
  generators_count: 2

scenarios:
  Homepage:
    script_id: 1
    target_intensity: 500
    intensity_unit: ops_m
    max_script_time_ms: 1200

  Search:
    script_id: 2
    target_intensity: 300
    intensity_unit: ops_m
    max_script_time_ms: 2000

profile:
  type: stability
  default_rampup_sec: 60
  default_impact_sec: 120
  default_stability_sec: 300
  default_rampdown_sec: 60
  percent: 100
