name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

env:
  GO_PRIMARY: '1.26'

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_PRIMARY }}
          cache: true

      - name: Tidy modules
        run: go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11

  # ---------------------------------------------------------------------------
  # Test (ubuntu-latest only, Go 1.24 + 1.25 + 1.26)
  # ---------------------------------------------------------------------------
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ['1.24', '1.25', '1.26']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Run tests
        run: make test

      - name: Upload coverage
        if: matrix.go == env.GO_PRIMARY
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella

  # ---------------------------------------------------------------------------
  # Security scan (lint + test must pass first)
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_PRIMARY }}
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -json ./... > govulncheck-results.json || true

      - name: Upload govulncheck results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: govulncheck-results
          path: govulncheck-results.json
          retention-days: 30

      - name: Comment PR with govulncheck results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = fs.readFileSync('govulncheck-results.json', 'utf8');
              const findings = [];
              for (const line of results.split('\n')) {
                if (!line.trim()) continue;
                const entry = JSON.parse(line);
                if (entry.vulnerability) {
                  findings.push(`**${entry.vulnerability.id}**: ${entry.vulnerability.details}`);
                }
              }
              if (findings.length > 0) {
                const body = `## govulncheck Results\n\nFound ${findings.length} vulnerabilities:\n\n` +
                  findings.slice(0, 10).join('\n\n') +
                  (findings.length > 10 ? '\n\n... and more' : '');
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body,
                });
              }
            } catch (e) {
              console.log('Could not parse govulncheck results:', e);
            }

      - name: Run Gosec Security Scanner
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude-generated -fmt json -out gosec-results.json ./... || true

      - name: Upload Gosec results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-results
          path: gosec-results.json
          retention-days: 30

      - name: Comment PR with Gosec results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('gosec-results.json', 'utf8'));
              const issues = results.Issues || [];
              if (issues.length > 0) {
                const body = `## Gosec Results\n\nFound ${issues.length} security issues:\n\n` +
                  issues.slice(0, 10).map(i =>
                    `**${i.severity}**: ${i.rule_id} - ${i.details} (${i.file}:${i.line})`
                  ).join('\n') +
                  (issues.length > 10 ? '\n\n... and more' : '');
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body,
                });
              }
            } catch (e) {
              console.log('Could not parse Gosec results:', e);
            }

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30
