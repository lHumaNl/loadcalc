version: "1.0"

global:
  tool: jmeter
  load_model: closed
  pacing_multiplier: 3.0
  deviation_tolerance: 2.5
  spike_participate: true
  generators_count: 2

scenarios:
  - name: "Main page"
    target_intensity: 360000
    intensity_unit: ops_h
    max_script_time_ms: 1100

  - name: "API endpoint"
    target_intensity: 600
    intensity_unit: ops_m
    max_script_time_ms: 500

profile:
  type: custom
  default_rampup_sec: 30
  default_impact_sec: 60
  default_stability_sec: 300
  default_rampdown_sec: 0
  steps:
    - percent: 100
    - percent: 200
    - percent: 100
      stability_sec: 600
    - percent: 300
    - percent: 200
