version: "1.0"

global:
  tool: jmeter
  load_model: closed
  pacing_multiplier: 3.0
  deviation_tolerance: 2.5
  spike_participate: true
  generators_count: 2

scenarios:
  Main page:
    target_intensity: 360000
    intensity_unit: ops_h
    max_script_time_ms: 1100

  Background monitor:
    target_intensity: 3600
    intensity_unit: ops_h
    max_script_time_ms: 200
    background: true
    background_percent: 100

  Non-spike endpoint:
    target_intensity: 180000
    intensity_unit: ops_h
    max_script_time_ms: 800
    spike_participate: false

profile:
  type: spike
  base_percent: 70
  spike_start_increment: 50
  spike_increment_growth: 10
  num_spikes: 3
  spiketime_sec: 120
  cooldown_sec: 300
  default_rampup_sec: 30
  default_impact_sec: 60
  default_stability_sec: 300
  default_rampdown_sec: 30
